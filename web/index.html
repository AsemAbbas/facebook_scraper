<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مَرصَد · Facebook Monitor</title>
<meta name="description" content="أداة رصد منشورات صفحات فيسبوك">
<meta name="theme-color" content="#ea580c">

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="mask-icon" href="favicon.svg" color="#ea580c">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== Auth Screen (shown when not logged in) ===== -->
<div id="authScreen" hidden></div>

<!-- ===== Main App (shown after login) ===== -->
<div id="appRoot" hidden>

<!-- background -->
<div class="bg-decoration">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
</div>

<!-- Live banner -->
<div class="live-status-banner" id="liveStatusBanner" hidden>
  <div class="live-status-inner">
    <span class="live-dot"></span>
    <span id="liveStatusText">يوجد عملية سحب قيد التنفيذ…</span>
    <a href="#" id="liveStatusLink" target="_blank" rel="noopener">عرض التفاصيل ↗</a>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="logo-mark">
        <span class="dot dot-1"></span>
        <span class="dot dot-2"></span>
        <span class="dot dot-3"></span>
      </div>
      <div class="brand-text">
        <h1>مَرصَد</h1>
        <p class="tagline">رصد منشورات صفحات فيسبوك</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="last-update" id="lastUpdate">
        <span class="pulse"></span>
        <span id="lastUpdateText">—</span>
      </div>

      <button class="btn-icon" id="historyBtn" title="سجل العمليات">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
        </svg>
      </button>
      <button class="btn-icon" id="managePagesBtn" title="الصفحات">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
      </button>
      <button class="btn-icon" id="analyticsBtn" title="الإحصاءات">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
      <button class="btn-icon" id="settingsBtn" title="الإعدادات">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <button class="btn-refresh" id="refreshBtn" title="تحديث">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        <span>تحديث</span>
      </button>

      <button class="btn-trigger" id="triggerBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>سحب الآن</span>
      </button>

      <!-- User menu -->
      <div class="user-menu" id="userMenu">
        <button class="btn-user" id="userBtn">
          <span class="user-avatar" id="userAvatar">م</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="user-dropdown" id="userDropdown" hidden>
          <div class="user-info">
            <strong id="userNameLabel">—</strong>
            <span id="userUsernameLabel"></span>
            <span id="userRoleLabel" class="user-role-chip">user</span>
          </div>
          <button class="dropdown-item" id="menuChangePass">🔐 كلمة السر</button>
          <button class="dropdown-item admin-only" id="menuManageUsers" hidden>👥 إدارة المستخدمين</button>
          <hr class="dropdown-sep">
          <button class="dropdown-item danger" id="menuLogout">🚪 تسجيل الخروج</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Stats -->
<section class="stats-bar">
  <div class="stat"><div class="stat-num" id="statPages">—</div><div class="stat-label">صفحات</div></div>
  <div class="stat"><div class="stat-num" id="statPosts">—</div><div class="stat-label">منشور</div></div>
  <div class="stat"><div class="stat-num" id="statReactions">—</div><div class="stat-label">تفاعل</div></div>
  <div class="stat"><div class="stat-num" id="statComments">—</div><div class="stat-label">تعليق</div></div>
</section>

<!-- Filters -->
<section class="controls">
  <div class="filter-group">
    <label class="filter-label">الصفحة</label>
    <select id="pageFilter" class="select"><option value="all">كل الصفحات</option></select>
  </div>
  <div class="filter-group">
    <label class="filter-label">المصدر</label>
    <select id="sourceFilter" class="select">
      <option value="all">كل المصادر</option>
      <option value="apify">💎 Apify (فيسبوك)</option>
      <option value="rss">📡 RSS</option>
    </select>
  </div>
  <div class="filter-group">
    <label class="filter-label">الترتيب</label>
    <select id="sortFilter" class="select">
      <option value="newest">الأحدث أولاً</option>
      <option value="oldest">الأقدم أولاً</option>
      <option value="reactions">الأعلى تفاعلاً</option>
      <option value="comments">الأكثر تعليقاً</option>
      <option value="shares">الأكثر مشاركة</option>
    </select>
  </div>
  <div class="filter-group flex-grow">
    <label class="filter-label">بحث</label>
    <input type="text" id="searchInput" class="input" placeholder="ابحث…">
  </div>
</section>

<section class="controls advanced-row">
  <div class="filter-group">
    <label class="filter-label">من تاريخ</label>
    <input type="date" id="dateFrom" class="input">
  </div>
  <div class="filter-group">
    <label class="filter-label">إلى تاريخ</label>
    <input type="date" id="dateTo" class="input">
  </div>
  <div class="filter-group">
    <label class="filter-label">حد أدنى تفاعل</label>
    <input type="number" id="minReactions" class="input" placeholder="0" min="0">
  </div>
  <div class="filter-group">
    <label class="filter-label">حد أدنى تعليقات</label>
    <input type="number" id="minComments" class="input" placeholder="0" min="0">
  </div>
  <div class="filter-group">
    <label class="filter-label">فلاتر سريعة</label>
    <div class="filter-checkboxes">
      <label class="checkbox-chip"><input type="checkbox" id="hasImageOnly"><span>🖼 بصور</span></label>
      <label class="checkbox-chip"><input type="checkbox" id="highEngagementOnly"><span>🔥 عالي</span></label>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">إجراءات</label>
    <div class="filter-action-buttons">
      <button class="btn-quick-range" data-range="24h">24س</button>
      <button class="btn-quick-range" data-range="7d">7أ</button>
      <button class="btn-quick-range" data-range="30d">30ي</button>
      <button class="btn-quick-range" data-range="all">كل</button>
      <button class="btn-reset-filters" id="resetFilters" type="button" title="إعادة تعيين">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
    </div>
  </div>
</section>

<!-- Results meta + bulk actions -->
<div class="results-meta">
  <div class="meta-left">
    <span id="resultCount">—</span>
    <span id="activeFiltersBadge" class="active-filters-badge" hidden></span>
  </div>
  <div class="meta-right">
    <button class="btn-meta" id="selectAllBtn" title="تحديد الكل">
      <input type="checkbox" id="selectAllCheckbox"> <span>تحديد</span>
    </button>
    <button class="btn-meta bulk-only" id="bulkDeleteBtn" hidden>
      🗑️ حذف المحدد
    </button>
    <button class="btn-meta" id="exportBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      تصدير
    </button>
    <button class="btn-meta danger" id="clearAllBtn" title="حذف كل المنشورات">
      🗑️ حذف الكل
    </button>
  </div>
</div>

<!-- View tabs: Posts | Analytics -->
<div class="view-tabs">
  <button class="view-tab active" data-view="posts">📝 المنشورات</button>
  <button class="view-tab" data-view="analytics">📊 الإحصاءات والتحليلات</button>
</div>

<!-- Posts grid -->
<main class="posts-grid view-pane" id="postsGrid" data-view="posts">
  <div class="loading">
    <div class="spinner"></div>
    <p>جاري التحميل…</p>
  </div>
</main>

<!-- Analytics (full page, uses the same filters at the top) -->
<main class="analytics-view view-pane" id="analyticsView" data-view="analytics" hidden></main>

<!-- Simple footer -->
<footer class="footer-simple">
  <p>© <span id="footerYear"></span> مَرصَد · جميع الحقوق محفوظة</p>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="إغلاق">×</button>
    <h2 id="modalTitle">—</h2>
    <div id="modalBody"></div>
  </div>
</div>

</div><!-- /#appRoot -->

<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
