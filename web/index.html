<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مَرصَد · Facebook Monitor</title>
<meta name="description" content="أداة رصد منشورات صفحات فيسبوك">
<meta name="theme-color" content="#ea580c">

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="mask-icon" href="favicon.svg" color="#ea580c">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== Auth Screen (shown when not logged in) ===== -->
<div id="authScreen" hidden></div>

<!-- ===== Main App (shown after login) ===== -->
<div id="appRoot" hidden>

<!-- background -->
<div class="bg-decoration">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
</div>

<!-- Live banner -->
<div class="live-status-banner" id="liveStatusBanner" hidden>
  <div class="live-status-inner">
    <span class="live-dot"></span>
    <span id="liveStatusText">يوجد عملية سحب قيد التنفيذ…</span>
    <a href="#" id="liveStatusLink" target="_blank" rel="noopener">عرض التفاصيل ↗</a>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="logo-mark">
        <span class="dot dot-1"></span>
        <span class="dot dot-2"></span>
        <span class="dot dot-3"></span>
      </div>
      <div class="brand-text">
        <h1>مَرصَد</h1>
        <p class="tagline">رصد منشورات صفحات فيسبوك</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="last-update" id="lastUpdate">
        <span class="pulse"></span>
        <span id="lastUpdateText">—</span>
      </div>

      <button class="btn-refresh" id="refreshBtn" title="تحديث">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        <span>تحديث</span>
      </button>

      <button class="btn-trigger" id="triggerBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>سحب الآن</span>
      </button>

      <!-- User menu -->
      <div class="user-menu" id="userMenu">
        <button class="btn-user" id="userBtn">
          <span class="user-avatar" id="userAvatar">م</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="user-dropdown" id="userDropdown" hidden>
          <!-- 1. User identity -->
          <div class="user-info">
            <strong id="userNameLabel">—</strong>
            <span id="userUsernameLabel"></span>
            <span id="userRoleLabel" class="user-role-chip">user</span>
          </div>

          <!-- 2. Main actions (الإجراءات) -->
          <div class="dropdown-section">
            <span class="dropdown-section-title">الإجراءات</span>
            <button class="dropdown-item" id="menuManagePages">
              <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
              </svg>
              <span>إدارة الصفحات</span>
            </button>
            <button class="dropdown-item" id="menuMediaLibrary">
              <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>مكتبة الوسائط</span>
            </button>
            <button class="dropdown-item" id="menuHistory">
              <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
              </svg>
              <span>سجل العمليات</span>
            </button>
            <button class="dropdown-item" id="menuSettings">
              <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span>الإعدادات والمصادر</span>
            </button>
          </div>

          <!-- 3. Account (حسابي) -->
          <div class="dropdown-section">
            <span class="dropdown-section-title">حسابي</span>
            <button class="dropdown-item" id="menuChangePass">
              <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <span>تغيير كلمة السر</span>
            </button>
          </div>

          <!-- 4. Admin section -->
          <div class="dropdown-section admin-only" hidden>
            <span class="dropdown-section-title">الإدارة</span>
            <button class="dropdown-item admin-only" id="menuManageUsers" hidden>
              <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <span>إدارة المستخدمين</span>
            </button>
          </div>

          <!-- 5. Logout -->
          <button class="dropdown-item danger" id="menuLogout">
            <svg class="di-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>تسجيل الخروج</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Stats -->
<section class="stats-bar">
  <div class="stat"><div class="stat-num" id="statPages">—</div><div class="stat-label">صفحات</div></div>
  <div class="stat"><div class="stat-num" id="statPosts">—</div><div class="stat-label">منشور</div></div>
  <div class="stat"><div class="stat-num" id="statReactions">—</div><div class="stat-label">تفاعل</div></div>
  <div class="stat"><div class="stat-num" id="statComments">—</div><div class="stat-label">تعليق</div></div>
</section>

<!-- Filters -->
<section class="controls">
  <div class="filter-group">
    <label class="filter-label">الصفحة</label>
    <div class="multiselect" data-filter="page">
      <button class="multiselect-trigger" type="button">
        <span class="multiselect-label">كل الصفحات</span>
        <svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="multiselect-dropdown" hidden>
        <input type="text" class="multiselect-search input" placeholder="🔍 ابحث…">
        <div class="multiselect-toolbar">
          <button class="btn-refresh btn-sm ms-select-all" type="button">تحديد الكل</button>
          <button class="btn-refresh btn-sm ms-clear" type="button">مسح</button>
        </div>
        <div class="multiselect-list" id="pageFilterList"></div>
      </div>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">المصدر</label>
    <div class="multiselect" data-filter="source">
      <button class="multiselect-trigger" type="button">
        <span class="multiselect-label">كل المصادر</span>
        <svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="multiselect-dropdown" hidden>
        <div class="multiselect-toolbar">
          <button class="btn-refresh btn-sm ms-select-all" type="button">تحديد الكل</button>
          <button class="btn-refresh btn-sm ms-clear" type="button">مسح</button>
        </div>
        <div class="multiselect-list">
          <label class="ms-item"><input type="checkbox" value="apify"><span>💎 Apify (فيسبوك)</span></label>
          <label class="ms-item"><input type="checkbox" value="rss"><span>📡 RSS</span></label>
        </div>
      </div>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">نوع المنشور</label>
    <div class="multiselect" data-filter="postType">
      <button class="multiselect-trigger" type="button">
        <span class="multiselect-label">كل الأنواع</span>
        <svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="multiselect-dropdown" hidden>
        <div class="multiselect-toolbar">
          <button class="btn-refresh btn-sm ms-select-all" type="button">تحديد الكل</button>
          <button class="btn-refresh btn-sm ms-clear" type="button">مسح</button>
        </div>
        <div class="multiselect-list">
          <label class="ms-item"><input type="checkbox" value="text"><span>📝 نص</span></label>
          <label class="ms-item"><input type="checkbox" value="photo"><span>🖼 صور</span></label>
          <label class="ms-item"><input type="checkbox" value="video"><span>🎥 فيديو</span></label>
          <label class="ms-item"><input type="checkbox" value="link"><span>🔗 رابط</span></label>
          <label class="ms-item"><input type="checkbox" value="live"><span>🔴 مباشر</span></label>
        </div>
      </div>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">الترتيب</label>
    <select id="sortFilter" class="select">
      <option value="newest">الأحدث أولاً</option>
      <option value="oldest">الأقدم أولاً</option>
      <option value="reactions">الأعلى تفاعلاً</option>
      <option value="comments">الأكثر تعليقاً</option>
      <option value="shares">الأكثر مشاركة</option>
    </select>
  </div>
  <div class="filter-group flex-grow">
    <label class="filter-label">بحث</label>
    <input type="text" id="searchInput" class="input" placeholder="ابحث…">
  </div>
</section>

<section class="controls advanced-row">
  <div class="filter-group">
    <label class="filter-label">من تاريخ</label>
    <input type="date" id="dateFrom" class="input">
  </div>
  <div class="filter-group">
    <label class="filter-label">إلى تاريخ</label>
    <input type="date" id="dateTo" class="input">
  </div>
  <div class="filter-group">
    <label class="filter-label">حد أدنى تفاعل</label>
    <input type="number" id="minReactions" class="input" placeholder="0" min="0">
  </div>
  <div class="filter-group">
    <label class="filter-label">حد أقصى تفاعل</label>
    <input type="number" id="maxReactions" class="input" placeholder="∞" min="0">
  </div>
  <div class="filter-group">
    <label class="filter-label">حد أدنى تعليقات</label>
    <input type="number" id="minComments" class="input" placeholder="0" min="0">
  </div>
  <div class="filter-group">
    <label class="filter-label">فلاتر سريعة</label>
    <div class="multiselect" data-filter="quick">
      <button class="multiselect-trigger" type="button">
        <span class="multiselect-label">بدون فلاتر</span>
        <svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="multiselect-dropdown" hidden>
        <div class="multiselect-toolbar">
          <button class="btn-refresh btn-sm ms-clear" type="button">مسح الكل</button>
        </div>
        <div class="multiselect-list">
          <label class="ms-item"><input type="checkbox" id="hasImageOnly"><span>🖼 بصور</span></label>
          <label class="ms-item"><input type="checkbox" id="hasVideoOnly"><span>🎥 بفيديو</span></label>
          <label class="ms-item"><input type="checkbox" id="textOnly"><span>📝 نص فقط</span></label>
          <label class="ms-item"><input type="checkbox" id="highEngagementOnly"><span>🔥 تفاعل عالي (1000+)</span></label>
          <label class="ms-item"><input type="checkbox" id="lowEngagementOnly"><span>❄️ تفاعل منخفض (&lt;50)</span></label>
          <label class="ms-item"><input type="checkbox" id="hasCommentsOnly"><span>💬 له تعليقات</span></label>
        </div>
      </div>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">إجراءات</label>
    <div class="filter-action-buttons">
      <button class="btn-quick-range" data-range="24h">24س</button>
      <button class="btn-quick-range" data-range="7d">7أ</button>
      <button class="btn-quick-range" data-range="30d">30ي</button>
      <button class="btn-quick-range" data-range="all">كل</button>
      <button class="btn-reset-filters" id="resetFilters" type="button" title="مسح كل الفلاتر" hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span style="margin-inline-start:4px">مسح الفلاتر</span>
      </button>
    </div>
  </div>
</section>

<!-- Results meta + bulk actions -->
<div class="results-meta">
  <div class="meta-left">
    <span id="resultCount">—</span>
    <span id="activeFiltersBadge" class="active-filters-badge" hidden></span>
  </div>
  <div class="meta-right">
    <div class="layout-toggle" role="group" aria-label="عرض">
      <button class="layout-btn active" data-layout="cards" type="button" title="بطاقات">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="layout-btn" data-layout="list" type="button" title="قائمة">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
    <button class="btn-meta" id="selectAllBtn" title="تحديد الكل">
      <input type="checkbox" id="selectAllCheckbox"> <span>تحديد</span>
    </button>
    <button class="btn-meta bulk-only" id="bulkDeleteBtn" hidden>
      🗑️ حذف المحدد
    </button>
    <button class="btn-meta" id="exportBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      تصدير
    </button>
    <button class="btn-meta danger" id="clearAllBtn" title="حذف كل المنشورات">
      🗑️ حذف الكل
    </button>
  </div>
</div>

<!-- View tabs: Posts | Analytics -->
<div class="view-tabs">
  <button class="view-tab active" data-view="posts">📝 المنشورات</button>
  <button class="view-tab" data-view="analytics">📊 الإحصاءات والتحليلات</button>
</div>

<!-- Posts grid -->
<main class="posts-grid view-pane" id="postsGrid" data-view="posts">
  <div class="loading">
    <div class="spinner"></div>
    <p>جاري التحميل…</p>
  </div>
</main>

<!-- Analytics (full page, uses the same filters at the top) -->
<main class="analytics-view view-pane" id="analyticsView" data-view="analytics" hidden></main>

<!-- Simple footer -->
<footer class="footer-simple">
  <p>© <span id="footerYear"></span> مَرصَد · جميع الحقوق محفوظة</p>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="إغلاق">×</button>
    <h2 id="modalTitle">—</h2>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Lightbox (image viewer) -->
<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" id="lightboxClose" aria-label="إغلاق">×</button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="السابق">‹</button>
  <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="التالي">›</button>
  <div class="lightbox-stage">
    <img id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-footer">
    <span id="lightboxCounter">1 / 1</span>
    <a id="lightboxDownload" href="#" download class="lightbox-action">⬇ تحميل</a>
    <a id="lightboxOpenNew" href="#" target="_blank" rel="noopener" class="lightbox-action">↗ فتح في tab جديد</a>
  </div>
</div>

</div><!-- /#appRoot -->

<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
