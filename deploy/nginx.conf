# ================================================================
#  مَرصَد — Nginx reverse proxy template
# ================================================================
#  انسخ هذا الملف إلى /etc/nginx/sites-available/marsad ثم:
#    sudo ln -s /etc/nginx/sites-available/marsad /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  بعد تثبيت Let's Encrypt:
#    sudo certbot --nginx -d marsad.example.com
#  سيضيف Certbot تلقائياً تحويل HTTP → HTTPS.
# ================================================================

# HTTP → HTTPS redirect (يتولاه certbot تلقائياً لكن نتركه هنا ك fallback)
server {
    listen 80;
    listen [::]:80;
    server_name marsad.example.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main config
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name marsad.example.com;

    # SSL certs (certbot يضبطها تلقائياً)
    ssl_certificate     /etc/letsencrypt/live/marsad.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marsad.example.com/privkey.pem;

    # SSL tuning
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size for image scraping
    client_max_body_size 25M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ---- Reverse proxy to Flask/gunicorn ----
    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Long-lived timeouts for scraping jobs
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # SSE / streaming support — DO NOT buffer or cache
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    # ---- Health check (لا تسجيل في الـ access log) ----
    location /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:5050/healthz;
    }

    # ---- Block sensitive files ----
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
