# =====================================================================
# مَرصَد · Multi-Source Facebook Pages Monitor
# لوحة التحكم المركزية لكل إعدادات المشروع
# =====================================================================
#
# 📚 دليل الاستخدام:
#   - لتفعيل مصدر: غيّر enabled: true
#   - الأولوية (priority): الأقل رقماً = الأعلى أولوية
#   - التوكنات: تُحفظ كـ GitHub Secrets ثم تُقرأ من environment
#
# 🔐 الأمان: لا تكتب أي توكن هنا مباشرة! استخدم ${ENV_VAR}
# =====================================================================

# ---------------------------------------------------------------------
# 🔌 المصادر (Sources)
# ---------------------------------------------------------------------
sources:

  # 💎 Apify - الأفضل جودة ($49/شهر - Starter plan)
  # 🔒 Apify actor مقفول في الكود على curious_coder/facebook-post-scraper
  # أي قيمة أخرى لـ actor_id تُتجاهل من قبل الـ adapter.
  # https://apify.com/curious_coder/facebook-post-scraper
  # ✅ تفاعلات دقيقة + تعليقات + يدعم pages/groups/profiles/search
  # 💰 ~$5 لكل 1000 منشور
  - name: apify
    enabled: false
    priority: 1
    token: ${APIFY_TOKEN}
    actor_id: "curious_coder/facebook-post-scraper"   # مقفول - لا تغيّره
    timeout_seconds: 600
    max_retries: 2
    # خيارات متقدمة (Apify فقط)
    include_comments: true              # سحب التعليقات أيضاً
    max_comments_per_post: 10           # أقصى تعليقات لكل منشور
    include_reactions_breakdown: true   # تفاصيل التفاعلات (like/love/...)
    include_videos: true                # تحميل روابط الفيديو
    include_external_links: true        # روابط خارجية في المنشور

  # 📡 RSS / Atom - أي رابط feed (مجاني، بدون token)
  # المنصة الآن تدعم مصدرين فقط: apify (لفيسبوك) و rss (لأي feed خارجي)
  - name: rss
    enabled: true
    priority: 2
    timeout_seconds: 30

# ---------------------------------------------------------------------
# 🎯 خيارات السحب العامة (مطبقة على كل المصادر)
# ---------------------------------------------------------------------
scraping:
  # فلاتر عند السحب (server-side)
  required_keywords: []        # فقط منشورات تحتوي إحدى الكلمات
  excluded_keywords: []        # تجاهل منشورات تحتوي إحدى الكلمات
  min_text_length: 5           # تجاهل المنشورات أقصر من X حرف
  skip_pinned: false           # تجاهل المنشور المثبت
  skip_sponsored: true         # تجاهل المنشورات الممولة
  language_filter: ""          # ar | en | "" (للكل)
  # خيارات التعليقات
  fetch_comments: true         # حاول جلب التعليقات (إن دعمها المصدر)
  comment_min_likes: 0         # عرض فقط التعليقات بأعلى عدد إعجاب
  # تنظيف
  remove_emojis: false
  remove_urls: false
  trim_text_to: 2000

# ---------------------------------------------------------------------
# 🔄 إعدادات الـ Fallback
# ---------------------------------------------------------------------
fallback:
  enabled: true              # لو مصدر فشل، جرّب التالي حسب الأولوية
  max_attempts: 3            # أقصى عدد مصادر نجربها
  retry_delay_seconds: 5     # تأخير بين المحاولات

# ---------------------------------------------------------------------
# 📅 الجدولة (تُستخدم في GitHub Actions)
# ---------------------------------------------------------------------
schedule:
  cron: "0 */6 * * *"        # كل 6 ساعات
  timezone: "UTC"

# ---------------------------------------------------------------------
# 📦 الإخراج
# ---------------------------------------------------------------------
output:
  dir: "web/data"
  index_file: "index.json"
  keep_history: 200          # آخر 200 منشور لكل صفحة
  merge_strategy: "unique_id" # unique_id | overwrite | append

# ---------------------------------------------------------------------
# 🔔 التنبيهات
# ---------------------------------------------------------------------
alerts:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    high_engagement_threshold: 5000
    keywords: []   # مثال: ["غزة", "القدس"] - ينبه عند ظهورها

  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    from_email: ${ALERT_EMAIL_FROM}
    to_email: ${ALERT_EMAIL_TO}
    password: ${ALERT_EMAIL_PASSWORD}

# ---------------------------------------------------------------------
# 🎨 إعدادات الواجهة
# ---------------------------------------------------------------------
frontend:
  site_title: "مَرصَد"
  site_tagline: "رصد منشورات صفحات فيسبوك · لأغراض إعلامية بحثية"
  posts_per_page: 100
  show_source_badge: true    # يُظهر المصدر (apify/rss/playwright) في كل منشور
  high_engagement_threshold: 1000
  default_language: "ar"

# ---------------------------------------------------------------------
# 🐛 Debug
# ---------------------------------------------------------------------
debug:
  verbose: true              # طباعة تفاصيل أكثر في الـ logs
  save_raw_responses: false  # حفظ الردود الخام (للتطوير فقط)
  raw_responses_dir: "docs/debug_raw"
