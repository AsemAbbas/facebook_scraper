name: Scrape

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      page_slug:
        description: 'Slug of single page (empty = all)'
        required: false
        default: ''
      force_source:
        description: 'Force source (apify/fetchrss/rssapp/rsshub/playwright)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml aiohttp playwright

      - name: Install Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FETCHRSS_API_KEY: ${{ secrets.FETCHRSS_API_KEY }}
          RSSAPP_API_KEY: ${{ secrets.RSSAPP_API_KEY }}
          RSSHUB_ACCESS_KEY: ${{ secrets.RSSHUB_ACCESS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.page_slug }}" ]; then
            ARGS="$ARGS --slug ${{ inputs.page_slug }}"
          fi
          if [ -n "${{ inputs.force_source }}" ]; then
            ARGS="$ARGS --source ${{ inputs.force_source }}"
          fi
          python scripts/run.py $ARGS

      - name: Telegram notify
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py || true

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "data: scheduled scrape $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
