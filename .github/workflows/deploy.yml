name: Marsad · Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_run:
    # ينشر تلقائياً بعد أي تشغيل ناجح لـ scrape
    workflows: ["Marsad · Scrape Facebook Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    # تخطى لو workflow_run فشل
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './web'
      - id: deployment
        uses: actions/deploy-pages@v4
